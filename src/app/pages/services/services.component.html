<main class="container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Elenco Prestazioni</h1>
      <p class="page-subtitle">I servizi offerti da Apice Clinic</p>
    </div>
  </div>
  @for (cat of categories; track cat) {
    <div class="services-section">
      <div class="services-section-title" (click)="toggle(cat)" style="cursor:pointer">
        <h2>{{ cat.label }}</h2>
        <span class="material-icons accordion-arrow" [class.open]="cat.open">expand_more</span>
      </div>
      @if (cat.open) {
        <div class="services-icon-grid">
          @for (s of cat.services; track s) {
            <div class="service-icon-card">
              <div class="service-circle" [style.background]="cat.bgColor" [style.color]="cat.color">
                <span class="material-icons">{{ s.icon }}</span>
              </div>
              <div class="service-icon-name">{{ s.name | uppercase }}</div>
              <p class="service-icon-desc">{{ s.description }}</p>
              @if (s.duration) {
                <span class="badge badge-info">{{ s.duration }}</span>
              }
            </div>
          }
        </div>
      }
    </div>
  }
</main>
