<main class="container">
  <div class="page-header">
    <div>
      <h1 class="page-title"><span class="material-icons page-title-icon">badge</span> Il Nostro Staff</h1>
      <p class="page-subtitle">I professionisti del tuo benessere</p>
    </div>
  </div>
  <div class="staff-grid">
    @for (member of staff; track member) {
      <div class="staff-card">
        <div class="staff-avatar-wrap staff-avatar-clickable" (click)="navigateTo(member.route)">
          <img class="staff-avatar" [src]="member.image" [alt]="member.firstName + ' ' + member.lastName"/>
        </div>
        <div class="staff-info">
          <p class="staff-name">
            {{ member.gender === 'female' ? 'Dott.ssa' : 'Dott.' }}
            {{ member.firstName }} {{ member.lastName }}
          </p>
          <p class="staff-role">{{ member.role }}</p>
        </div>
      </div>
    }
  </div>
</main>
